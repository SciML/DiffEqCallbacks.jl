name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  test:
    name: "Downgrade"
    # Disabled: the current compat lower bounds cannot be resolved strictly
    # (allow-reresolve: false) at GROUP=Core. Pinning the direct deps to their
    # floors locks RecursiveArrayTools at 3.36.0, which caps LinearSolve at the
    # <= 3.36 line, while the test target's OrdinaryDiffEqNonlinearSolve floor
    # pulls in LinearSolve >= 3.46 (LinearSolve >= 3.29 itself requires
    # RecursiveArrayTools >= 3.37.0). The intersection is empty, so the test
    # environment is unsatisfiable with allow-reresolve: false. Re-enabling
    # would require raising the RecursiveArrayTools floor to >= 3.37.0 (a real
    # compat change, not a CI knob). Until then this job is disabled rather than
    # relaxed via allow-reresolve, which would silently hide the floor conflict.
    if: false
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      group: "Core"
      skip: "Pkg,TOML"
      allow-reresolve: false
    secrets: "inherit"
